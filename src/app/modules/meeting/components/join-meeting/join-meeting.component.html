<div class="join-meeting-dialog">
  <h2 mat-dialog-title>Join Meeting</h2>
  <form [formGroup]="joinForm" (ngSubmit)="onJoin()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Meeting ID or Code</mat-label>
      <input matInput formControlName="meetingId" placeholder="Enter meeting ID or 12-digit code">
      <mat-error *ngIf="joinForm.get('meetingId')?.hasError('required')">
        Meeting ID or Code is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password (if required)</mat-label>
      <input matInput type="password" formControlName="password" placeholder="Enter password">
    </mat-form-field>

    <div class="dialog-actions">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="!joinForm.valid">
        Join Meeting
      </button>
    </div>
  </form>
</div>
